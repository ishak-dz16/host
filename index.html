<!DOCTYPE html>
<"html manifest="cache.manifest>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هوست إسحاق بن يحي - النسخة الاحترافية</title>
    <style>
        body {
            /* تصحيح مسار الخلفية وإضافة لون احتياطي */
            background: #000c1f url('host pbb.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* الطبقة الشفافة فوق الخلفية لزيادة الوضوح */
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            width: 85%;
            max-width: 450px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #00c6ff;
            text-shadow: 0 0 20px rgba(0, 198, 255, 0.6);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 19px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #004e92, #00c6ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px #00c6ff;
        }

        .btn-info {
            background: linear-gradient(45deg, #222, #444);
            margin-top: 10px;
            font-size: 16px;
        }

        /* تنسيق النافذة المنبثقة */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
        }

        .modal-content {
            background: #001a33;
            margin: 15% auto;
            padding: 25px;
            border: 2px solid #00c6ff;
            width: 320px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            animation: slideDown 0.4s;
        }

        @keyframes slideDown { from {opacity: 0; transform: translateY(-50px);} to {opacity: 1; transform: translateY(0);} }

        .close { position: absolute; left: 15px; top: 10px; color: #ff4444; font-size: 28px; cursor: pointer; }

        #cache-status {
            margin-top: 25px;
            font-size: 15px;
            color: #00ffcc;
            font-weight: bold;
            min-height: 20px;
        }

        .version-tag {
            position: fixed;
            bottom: 15px; left: 15px;
            font-size: 12px; color: rgba(255,255,255,0.5);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <h1>إسحاق هوست 🇩🇿</h1>
        
        <div class="btn-group">
            <a href="672/index.html" class="btn">تعديل نظام 6.72</a>
            <a href="900/index.html" class="btn">تعديل نظام 9.00</a>
            <button onclick="showInfo()" class="btn btn-info">معلومات المطور</button>
        </div>

        <div id="cache-status">جاري التحقق من التحديثات...</div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeInfo()">&times;</span>
            <h2 style="color:#00c6ff">عن المطور</h2>
            <p>الاسم: <b>إسحاق بن يحي</b></p>
            <p>العمر: <b>11 سنة</b></p>
            <p>البلد: <b>الجزائر 🇩🇿</b></p>
            <p style="font-size: 12px; color: #888;">مبرمج هوستات PS4 واعد</p>
        </div>
    </div>

    <div class="version-tag">BETA v1.3 - Ishak Host</div>

    <script>
        // وظائف النافذة
        function showInfo() { document.getElementById('infoModal').style.display = "block"; }
        function closeInfo() { document.getElementById('infoModal').style.display = "none"; }
        window.onclick = function(e) { if (e.target.className == 'modal') closeInfo(); }

        // كود الـ Cache المطور
        var statusDisp = document.getElementById('cache-status');
        var appCache = window.applicationCache;

        appCache.addEventListener('progress', function(e) {
            var percent = Math.round((e.loaded / e.total) * 100);
            statusDisp.innerHTML = "جاري الحفظ للاستخدام بدون نت: " + percent + "% ⏳";
        }, false);

        appCache.addEventListener('cached', function() {
            statusDisp.innerHTML = "تم الحفظ بنجاح! يمكنك فصل النت ✅";
        }, false);

        appCache.addEventListener('noupdate', function() {
            statusDisp.innerHTML = "الهوست جاهز ومحدث (Offline) ✅";
        }, false);

        appCache.addEventListener('updateready', function() {
            appCache.swapCache();
            location.reload();
        }, false);

        appCache.addEventListener('error', function() {
            statusDisp.innerHTML = "جاهز للعمل";
        }, false);
    </script>
</body>
</html>
