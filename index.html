<!DOCTYPE html>
<html manifest="cache.manifest" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إسحاق بن يحي - BETA 3.0</title>
    <title>هوست إسحاق بن يحي - النسخة الاحترافية</title>
    <style>
        body {
            background: #000c1f url('host pbb.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            width: 85%;
            max-width: 450px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #00c6ff;
            text-shadow: 0 0 20px rgba(0, 198, 255, 0.6);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 19px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #004e92, #00c6ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px #00c6ff;
        }

        /* تنسيق زر الكاش الجديد */
        .btn-cache {
            background: linear-gradient(45deg, #d4145a, #fbb03b);
            margin-top: 5px;
        }

        .btn-info {
            background: linear-gradient(45deg, #222, #444);
            margin-top: 5px;
            font-size: 16px;
        }

        #cache-status {
            margin-top: 25px;
            font-size: 15px;
            color: #00ffcc;
            font-weight: bold;
            min-height: 20px;
        }

        /* تنسيق المودال */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
        }

        .modal-content {
            background: #001a33;
            margin: 15% auto;
            padding: 25px;
            border: 2px solid #00c6ff;
            width: 320px;
            border-radius: 20px;
            text-align: center;
            position: relative;
        }

        .close { position: absolute; left: 15px; top: 10px; color: #ff4444; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <h1>إسحاق هوست 🇩🇿</h1>
        
        <div class="btn-group">
            <a href="672/index.html" class="btn">تعديل نظام 6.72</a>
            <a href="900/index.html" class="btn">تعديل نظام 9.00</a>
            <button onclick="startCache()" class="btn btn-cache">Offline Cache (تفعيل الكاش)</button>
            <button onclick="showInfo()" class="btn btn-info">معلومات المطور</button>
        </div>

        <div id="cache-status">جاري التحقق من التحديثات...</div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeInfo()">&times;</span>
            <h2 style="color:#00c6ff">عن المطور</h2>
            <p>الاسم: <b>إسحاق بن يحي</b></p>
            <p>العمر: <b>11 سنة</b></p>
            <p>البلد: <b>الجزائر 🇩🇿</b></p>
        </div>
    </div>

    <script>
        function showInfo() { document.getElementById('infoModal').style.display = "block"; }
        function closeInfo() { document.getElementById('infoModal').style.display = "none"; }

        // وظيفة زر الكاش الجديد
        function startCache() {
            if (window.applicationCache) {
                try {
                    window.applicationCache.update();
                    document.getElementById('cache-status').innerHTML = "جاري محاولة تحديث الكاش... ⏳";
                } catch (e) {
                    document.getElementById('cache-status').innerHTML = "قم بتحديث الصفحة لبدء الكاش";
                }
            }
        }

        // كود معالجة الكاش
        if (window.applicationCache) {
            var appCache = window.applicationCache;
            var statusDisp = document.getElementById('cache-status');

            appCache.addEventListener('downloading', function() {
                statusDisp.innerHTML = "بدء التحميل... انتظر قليلاً ⏳";
            }, false);

            appCache.addEventListener('progress', function(e) {
                if (e.lengthComputable) {
                    var percent = Math.round((e.loaded / e.total) * 100);
                    statusDisp.innerHTML = "جاري حفظ الملفات: " + percent + "% 🚀";
                    statusDisp.style.color = "#ffcc00";
                }
            }, false);

            appCache.addEventListener('cached', function() {
                statusDisp.innerHTML = "تم الكاش بنجاح! اقطع النت ✅";
                statusDisp.style.color = "#00ffcc";
                alert("مبروك يا إسحاق! الهوست صار يعمل بدون إنترنت.");
            }, false);

            appCache.addEventListener('noupdate', function() {
                statusDisp.innerHTML = "الهوست جاهز للاستخدام أوفلاين ✅";
                statusDisp.style.color = "#00ffcc";
            }, false);

            appCache.addEventListener('error', function() {
                statusDisp.innerHTML = "❌ فشل الكاش! تأكد من ملف cache.manifest";
                statusDisp.style.color = "#ff4444";
            }, false);
        }
    </script>
</body>
</html>
