<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إسحاق هوست 6.72 - GoldHEN Edition</title>
    <style>
        body {
            background: linear-gradient(135deg, #001f3f, #000000);
            color: white;
            text-align: center;
            font-family: sans-serif;
            padding-top: 50px;
            margin: 0;
        }
        .status-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #3498db;
            border-radius: 15px;
            display: inline-block;
            padding: 30px;
            margin-top: 20px;
            min-width: 320px;
        }
        #progress {
            font-size: 20px;
            color: #39FF14;
            margin-bottom: 10px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { margin-top: 50px; color: #666; font-size: 14px; }
    </style>

    <script src="common.js"></script>
    <script src="int64.js"></script>
    <script src="exploit.js"></script>
</head>
<body>

    <h1>إسحاق هوست 🇩🇿</h1>
    <p>نظام PS4 - إصدار 6.72</p>

    <div class="status-box">
        <div id="progress">جاري تشغيل الثغرة... انتظر</div>
        <div class="loader" id="loader"></div>
    </div>

    <div class="footer">المبرمج: إسحاق بن يحي | 2026</div>

    <script>
        // وظيفة سحب ملف الـ bin وإرساله للبلايستيشن
        function loadGoldHEN() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'goldhen.bin', true); // تأكد أن اسم الملف في جيت هاب هو goldhen.bin
            xhr.responseType = 'arraybuffer';
            
            xhr.onload = function() {
                if (xhr.status === 200) {
                    document.getElementById("progress").innerHTML = "جاري حقن GoldHEN في النظام...";
                    var payload_data = new Uint8Array(xhr.response);
                    
                    // إرسال البيانات للمعالج (موجودة في exploit.js)
                    if (window.postPayload) {
                        window.postPayload(payload_data);
                    } else {
                        // كود احتياطي في حال اختلاف المسميات في exploit.js
                        setTimeout(function(){ location.reload(); }, 2000);
                    }
                    
                    document.getElementById("progress").innerHTML = "تم التفعيل بنجاح! ✅";
                    document.getElementById("loader").style.display = "none";
                }
            };
            xhr.send();
        }

        // الوظيفة التي يناديها ملف exploit.js عند نجاح الثغرة
        function jb_finished() {
            loadGoldHEN();
        }

        // معالجة الأخطاء
        window.onerror = function(msg) {
            if (msg.includes("Out of memory")) {
                document.getElementById("progress").innerHTML = "خطأ في الذاكرة.. أعد تشغيل الصفحة";
            }
        };
    </script>
</body>
</html>
