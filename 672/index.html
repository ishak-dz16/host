<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تعديلة GoldHEN 6.72</title>
    <style>
        body {
            background: #000c1f; /* لون داكن متناسق مع صورتك */
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 50px 20px;
        }

        .loader {
            border: 5px solid #1a1a1a;
            border-top: 5px solid #00c6ff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h1 { color: #00c6ff; font-size: 24px; }
        .status-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(0, 198, 255, 0.3);
            display: inline-block;
            min-width: 300px;
        }

        #status { font-size: 18px; color: #aaa; }
        .version { font-size: 12px; color: #555; margin-top: 20px; }
    </style>
</head>
<body onload="setTimeout(startGolden, 500)">

    <div class="loader"></div>
    <div class="status-box">
        <h1>نظام 6.72</h1>
        <div id="status">جاري تحضير ملفات الثغرة...</div>
    </div>
    
    <div class="version">مدعوم بـ GoldHEN v2.4b18.9</div>

    <script src="int64.js"></script>
    <script src="exploits.js"></script>
    <script src="mira.js"></script> <script>
        function startGolden() {
            document.getElementById('status').innerHTML = "جاري استغلال الثغرة يا يماك (Kernel Exploit)...";
            document.getElementById('status').style.color = "#ffcc00";

            // هذا الجزء يعتمد على الوظائف الموجودة داخل exploits.js
            // إذا نجحت الثغرة سيقوم الملف تلقائياً بتشغيل mira.js (GoldHEN)
            
            setTimeout(function() {
                if(window.main_ret == 0) {
                    document.getElementById('status').innerHTML = "تم الاختراق بنجاح! <br> انتظر شعار GoldHEN الآن.";
                    document.getElementById('status').style.color = "#00ff00";
                } else {
                    document.getElementById('status').innerHTML = "فشل في المحاولة.. أعد تحميل الصفحة.";
                    document.getElementById('status').style.color = "#ff4444";
                }
            }, 2000);
        }
    </script>

</body>
</html>
