<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إسحاق هوست - 9.00 Red Edition</title>
    <style>
        body {
            background-color: #0d0000;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .header {
            font-size: 30px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 15px #ff0000;
            margin-bottom: 20px;
        }

        .container {
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid #ff0000;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.3);
            width: 85%;
            max-width: 450px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn {
            padding: 15px;
            background: linear-gradient(45deg, #800000, #ff0000);
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.03);
            filter: brightness(1.2);
            box-shadow: 0 0 15px #ff0000;
        }

        #status {
            margin-top: 25px;
            font-size: 18px;
            color: #ffcc00;
            font-weight: bold;
            min-height: 25px;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>

    <script src="./int64.js"></script>
<script src="./rop.js"></script>
<script src="./kexploit.js"></script>
<script src="./payload.js"></script>
</head>
<body>

    <div class="header">إسحاق هوست - إصدار 9.00</div>

    <div class="container">
        <div id="status">جاهز لتشغيل الثغرة...</div>
        <br>
        <div class="btn-group">
            <button class="btn" onclick="load_goldhen('GoldHEN212.bin')">GoldHEN v2.1.2</button>
            <button class="btn" onclick="load_goldhen('GoldHEN23.bin')">GoldHEN v2.3</button>
            <button class="btn" onclick="load_goldhen('GoldHEN_Latest.bin')">GoldHEN Latest (جديد) 🔥</button>
        </div>
        
        <a href="../index.html" style="color: #888; text-decoration: none; display: block; margin-top: 15px;">العودة للخلف</a>
    </div>

    <div class="footer-text">قاعدة البيانات مستوحاة من مستودع Isfayeed</div>

    <script>
        function load_goldhen(payloadName) {
            document.getElementById('status').innerHTML = "جاري تشغيل Webkit... انتظر رسالة USB ⏳";
            document.getElementById('status').style.color = "#ffcc00";

            // في نسخة 9.00 نستخدم سلسلة من الأوامر لفتح الثغرة
            setTimeout(function() {
                try {
                    // الوظيفة الأساسية في مستودع إسلام فايد غالباً ما تكون محملة تلقائياً
                    // سنقوم بتمرير اسم الملف المختار لبرنامج الإرسال
                    run_jb(payloadName); 
                } catch(e) {
                    // إذا فشل التشغيل التلقائي، نظهر رسالة خطأ
                    document.getElementById('status').innerHTML = "خطأ: تأكد من وجود ملفات kexploit.js و payload.js";
                    document.getElementById('status').style.color = "#ff0000";
                }
            }, 500);
        }

        // إخفاء أخطاء الذاكرة المعتادة في 9.00
        window.onerror = function() { return true; };
    </script>

</body>
</html>
