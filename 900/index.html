<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ISSAK HOST | PSFREE 9.00</title>
    <style>
        body { background: radial-gradient(circle, #200 0%, #000 100%); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .header { font-size: 35px; color: #ff0000; text-shadow: 0 0 20px #ff0000; margin-top: 40px; font-weight: bold; }
        .status-box { margin: 20px auto; padding: 20px; width: 85%; max-width: 550px; background: rgba(0,0,0,0.8); border: 2px solid #ff0000; border-radius: 20px; box-shadow: 0 0 25px rgba(255, 0, 0, 0.5); }
        #status { font-size: 22px; color: #ffcc00; margin-bottom: 15px; font-weight: bold; }
        .btn-container { display: flex; flex-direction: column; align-items: center; }
        .btn { background: linear-gradient(to bottom, #800, #400); color: white; border: 1px solid #f00; padding: 12px; font-size: 18px; border-radius: 8px; cursor: pointer; transition: 0.2s; width: 90%; max-width: 300px; margin: 8px; font-weight: bold; }
        .btn:hover { background: #f00; box-shadow: 0 0 20px #f00; transform: scale(1.03); }
        
        /* زر الإصدار الأخير 2.4b18.9 */
        .btn-ultimate { 
            background: linear-gradient(to bottom, #006400, #002200); 
            border: 2px solid #0f0; 
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6); 
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 5px #0f0; }
            to { box-shadow: 0 0 25px #0f0; }
        }

        .footer { position: fixed; bottom: 10px; width: 100%; color: #555; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">إسحاق هوست 🔥</div>
    
    <div class="status-box">
        <div id="status">جاهز للاختراق.. اختر نسخة GoldHEN</div>
        
        <div class="btn-container">
            <button class="btn btn-ultimate" onclick="launch_payload('goldhen_2.4b18.9.bin')">GoldHEN v2.4b18.9 (الأحدث 🔥)</button>
            <button class="btn" onclick="launch_payload('goldhen_2.3.bin')">GoldHEN v2.3</button>
            <button class="btn" onclick="launch_payload('goldhen_2.1.2.bin')">GoldHEN v2.1.2</button>
        </div>
    </div>

    <div class="footer">تطوير إسحاق | حصرياً لنسخة 9.00 🇩🇿</div>

    <script src="psfree.js"></script>
    <script src="int64.js"></script>
    <script src="rop.js"></script>
    <script src="kexploit.js"></script>

            setTimeout(function(){

            document.getElementById('status').innerHTML = "⚠️ أدخل الفلاشة (USB) الآن يا بطل! ⚠️";
            document.getElementById('status').style.color = "#ff0000";
            alert("إسحاق هوست يطلب منك: أدخل الفلاشة الآن");
        }
    </script>
</body>
</html>
