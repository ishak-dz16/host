<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إسحاق هوست - خيارات GoldHen 9.00</title>
    <style>
        body {
            background: #000c1f;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            margin: 0;
            padding-top: 50px;
        }

        h1 { color: #00c6ff; text-shadow: 0 0 15px rgba(0,198,255,0.5); }
        
        .status-box {
            color: #ffcc00;
            font-size: 18px;
            margin-bottom: 30px;
            font-weight: bold;
            min-height: 25px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn {
            width: 80%;
            max-width: 350px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #004e92, #00c6ff);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00c6ff;
        }

        /* تمييز نسخة البيتا أو الأحدث */
        .btn-latest {
            background: linear-gradient(45deg, #d4145a, #fbb03b);
        }

        .loader {
            display: none;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #ffcc00;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>إسحاق هوست - نظام 9.00 🇩🇿</h1>
    <p style="color: #888;">اختر نسخة GoldHen لتفعيلها (بدون فلاشة)</p>

    <div id="status-msg" class="status-box">بانتظار اختيار النسخة...</div>
    <div id="loader" class="loader"></div>

    <div class="btn-group">
        <button onclick="launchExploit('v2.4b18.bin')" class="btn btn-latest">GoldHen v2.4b18.9 (الأحدث)</button>
        <button onclick="launchExploit('v2.3.bin')" class="btn">GoldHen v2.3 (مستقرة)</button>
        <button onclick="launchExploit('v2.2.5.bin')" class="btn">GoldHen v2.2.5</button>
        <button onclick="launchExploit('v2.1.2.bin')" class="btn" style="background: #333;">GoldHen v2.1.2</button>
    </div>

    <p id="log" style="font-size: 12px; color: #555; margin-top: 30px;">تطوير المبرمج إسحاق بن يحي - الجزائر</p>

    <script src="int64.js"></script>
    <script src="rop.js"></script>
    <script src="kexploit.js"></script>
    <script src="webkit.js"></script>

    <script>
        function launchExploit(version) {
            // إخفاء الأزرار وإظهار لودر التحميل
            document.querySelector('.btn-group').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            
            var status = document.getElementById('status-msg');
            status.innerHTML = "جاري تفعيل " + version + " بدون فلاشة... ⏳";

            // بدء عملية الاختراق بعد ثانية واحدة للاستقرار
            setTimeout(function() {
                try {
                    // تشغيل وظيفة المحاكاة (pVFS) الموجودة في kexploit.js
                    if (typeof pVFS_start === "function") {
                        pVFS_start();
                        status.innerHTML = "تم إنشاء القرص الوهمي.. جاري حقن الـ Payload..";
                        
                        // استدعاء ملف الـ bin المناسب للنسخة
                        // هنا نرسل النسخة المختارة للوظيفة المسؤولة عن تحميل الـ Payload
                        load_payload_by_version(version);
                    } else {
                        status.innerHTML = "❌ خطأ: ملف kexploit.js غير جاهز";
                        status.style.color = "#ff4444";
                    }
                } catch (e) {
                    status.innerHTML = "❌ حدث خطأ في الذاكرة (Out of Memory)";
                    status.style.color = "#ff4444";
                    alert("اضغط موافق وأعد محاولة الدخول للصفحة");
                    location.reload();
                }
            }, 1000);
        }

        function load_payload_by_version(ver) {
            console.log("النسخة المطلوبة للحقن هي: " + ver);
            // ملاحظة: هنا يجب أن يكون لديك منطق في ملف kexploit.js 
            // يقوم بسحب ملف الـ .bin الصحيح بناءً على النص المرسل (ver)
        }
    </script>
</body>
</html>
