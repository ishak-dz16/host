<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إسحاق هوست - اختيار نسخة GoldHen</title>
    <style>
        body {
            background: #000c1f;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        h1 { color: #00c6ff; text-shadow: 0 0 15px rgba(0,198,255,0.5); }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            width: 80%;
            max-width: 350px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #004e92, #00c6ff);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00c6ff;
        }

        .btn-gold {
            background: linear-gradient(45deg, #d4145a, #fbb03b);
        }

        .loader {
            display: none;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #ffcc00;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #status { color: #ffcc00; font-weight: bold; margin-top: 20px; min-height: 25px; }
    </style>
</head>
<body>

    <h1>إسحاق هوست - نظام 9.00 🇩🇿</h1>
    <p style="color: #888;">اختر النسخة التي تريد تفعيلها (بدون فلاشة)</p>

    <div class="btn-group" id="menu">
        <button onclick="startExploit('2.4b18.bin')" class="btn btn-gold">GoldHen v2.4b18.9 (الأحدث)</button>
        <button onclick="startExploit('2.3.bin')" class="btn">GoldHen v2.3 (مستقرة)</button>
        <button onclick="startExploit('2.2.5.bin')" class="btn">GoldHen v2.2.5</button>
        <button onclick="startExploit('2.1.2.bin')" class="btn" style="background: #333;">GoldHen v2.1.2</button>
    </div>

    <div id="loader" class="loader"></div>
    <div id="status"></div>

    <script src="int64.js"></script>
    <script src="rop.js"></script>
    <script src="webkit.js"></script>
    <script src="kexploit.js"></script>

    <script>
        function startExploit(version) {
            // إخفاء القائمة وإظهار اللودر
            document.getElementById('menu').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            
            var status = document.getElementById('status');
            status.innerHTML = "جاري تشغيل الثغرة لنسخة " + version + "...";

            setTimeout(function() {
                try {
                    // تشغيل محاكاة الفلاشة (pVFS)
                    if (typeof pVFS_start === "function") {
                        pVFS_start();
                        status.innerHTML = "تم إنشاء القرص الوهمي.. جاري جلب ملف الـ .bin";
                        
                        // تحميل ملف الـ .bin بناءً على النسخة المختارة
                        loadBinFile("goldhen_" + version + ".bin");
                    }
                } catch (e) {
                    status.innerHTML = "❌ فشلت المحاولة (Out of Memory)";
                    status.style.color = "#ff4444";
                }
            }, 1000);
        }

        function loadBinFile(fileName) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', fileName, true);
            xhr.responseType = 'arrayBuffer';

            xhr.onload = function() {
                if (xhr.status === 200) {
                    var payloadBuffer = new Uint8Array(xhr.response);
                    
                    // إرسال البيانات لوظيفة الحقن في ملف kexploit.js
                    if (typeof dispatchPayload === "function") {
                        dispatchPayload(payloadBuffer);
                        document.getElementById('status').innerHTML = "تم التفعيل بنجاح! ✅";
                    } else if (typeof PLOAD === "function") {
                        PLOAD(payloadBuffer);
                        document.getElementById('status').innerHTML = "تم التفعيل بنجاح! ✅";
                    }
                } else {
                    document.getElementById('status').innerHTML = "❌ خطأ: لم يتم العثور على ملف " + fileName;
                }
            };
            xhr.send();
        }
    </script>
</body>
</html>
