<!DOCTYPE html>
<html manifest="offline.cache">
<head>
    <meta charset="UTF-8">
    <title>Cache Page</title>
</head>
<body>
    <h1 style="text-align:center;">جاري تحميل الكاش...</h1>
    
    <script>
        // السطر الأول: التصحيح اللي قلت عليه
        var cache = window.applicationCache;

        // السطر الثاني: تصحيح الـ Event Listener والـ Function
        cache.addEventListener("cached", function(e) {
            alert("تم الحفظ! طفي الأنترنت دوكا.");
            // الرجوع التلقائي
            window.location.href = "index.html";
        }, false);

        // إذا كان الكاش ديجا موجود وما سحقش تحديث
        cache.addEventListener("noupdate", function(e) {
            window.location.href = "index.html";
        }, false);

        // في حالة وجود خطأ
        cache.addEventListener("error", function(e) {
            console.log("Error status: " + e);
        }, false);
    </script>
</body>
</html>
