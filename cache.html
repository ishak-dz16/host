<!DOCTYPE html>
<html manifest="manifest.cache">
<head>
    <meta charset="UTF-8">
    <title>إسحاق هوست - حفظ الملفات</title>
    <style>
        body {
            background: #000c1f url('host_pbb.png') no-repeat center center fixed;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            border: 2px solid #00ffcc;
            padding: 30px;
            border-radius: 15px;
            background: #222;
        }
        h1 { color: #00ffcc; }
    </style>
</head>
<body>

    <div class="box">
        <h1 id="status">جاري حفظ الملفات...</h1>
        <p id="msg">يرجى الانتظار قليلاً</p>
    </div>

    <script>
        var cache = window.applicationCache;

        cache.addEventListener('cached', function() {
            document.getElementById("status").innerHTML = "تم الحفظ بنجاح!";
            document.getElementById("msg").innerHTML = "الآن اخرج من المتصفح، اقطع الإنترنت، ثم عد للدخول مجدداً.";
            // هنا الكود يحبس باش يخليك نتا تخرج وتطفي النت براحتك
        }, false);

        cache.addEventListener('updateready', function() {
            cache.swapCache();
            location.reload();
        }, false);

        cache.addEventListener('noupdate', function() {
            // إذا الملفات محفوظة ديجا، يديك ديريكت للصفحة الرئيسية
            window.location.href = "index.html";
        }, false);

        cache.addEventListener('error', function() {
            document.getElementById("status").innerHTML = "حدث خطأ!";
            document.getElementById("msg").innerHTML = "تأكد من ملف المانيفست والأنترنت.";
        }, false);
    </script>
</body>
</html>
