<!DOCTYPE html>
<html manifest="cache.appcache">
<head>
    <meta charset="UTF-8">
    <title>PS4 Exploit Offline Installer</title>
    <style>
        body {
            background: #000c1f url('cache_pbb.png') no-repeat center center fixed;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        /* شريط التحميل الخارجي */
        #progress-wrapper {
            width: 80%;
            height: 40px;
            background-color: #333;
            border: 2px solid #555;
            border-radius: 20px;
            margin: 30px auto;
            overflow: hidden;
            position: relative;
        }
        /* الشريط الملون اللي يتحرك */
        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #007bff; /* لون أزرق */
            transition: width 0.2s ease-in-out;
        }
        #percentage {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #007bff;
        }
        .msg-box {
            display: none;
            background: #222;
            border: 2px solid #f1c40f;
            padding: 20px;
            width: 80%;
            margin: 20px auto;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div id="percentage">0%</div>

    <div id="progress-wrapper">
        <div id="progress-bar"></div>
    </div>

    <div id="status">جاري فحص ملفات الكاش...</div>

    <div id="msg-box" class="msg-box">
        <h2 style="color: #f1c40f;">اكتمل التحميل 100%</h2>
        <p>من فضلك اطفئ الانترنت على جهاز PS4 الآن.</p>
        <p>أعد تشغيل المتصفح، سيتم توجيهك للصفحة الرئيسية...</p>
    </div>

    <script>
        var cache = window.applicationCache;
        var bar = document.getElementById('progress-bar');
        var pct = document.getElementById('percentage');
        var statusTxt = document.getElementById('status');
        var msgBox = document.getElementById('msg-box');

        // تحديث النسبة المئوية والشريط مع كل ملف يتحمل
        cache.addEventListener('progress', function(e) {
            if (e.lengthComputable) {
                var progress = Math.round((e.loaded / e.total) * 100);
                bar.style.width = progress + '%';
                pct.innerHTML = progress + '%';
                statusTxt.innerHTML = "تحميل الملفات: " + e.loaded + " / " + e.total;
            }
        }, false);

        // كي يخلص الكاش كامل
        cache.addEventListener('cached', function() {
            done();
        }, false);

        cache.addEventListener('noupdate', function() {
            done();
        }, false);

        function done() {
            bar.style.width = '100%';
            pct.innerHTML = '100%';
            statusTxt.style.display = 'none';
            msgBox.style.display = 'block';

            // يرجعك للصفحة الرئيسية أوتوماتيك بعد 6 ثواني (باش تلحق تقرا الميساج)
            setTimeout(function(){
                window.location.href = "index.html";
            }, 6000);
        }

        // معالجة الأخطاء باش ما يتبلوكاوش الناس
        cache.addEventListener('error', function() {
            statusTxt.innerHTML = "الملفات موجودة مسبقاً أو حدث خطأ بسيط.";
            setTimeout(function(){ window.location.href = "index.html"; }, 4000);
        }, false);
    </script>
</body>
</html>
