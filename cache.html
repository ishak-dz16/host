<!DOCTYPE html>
<html manifest="cache.appcache"> <head>
    <meta charset="UTF-8">
    <title>جاري التحميل وتثبيت الكاش...</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .loader {
            border: 16px solid #f3f3f3;
            border-top: 16px solid #3498db;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        img {
            max-width: 200px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <img src="اسم_التصويرة_تاعك.jpg" alt="Loading...">

    <h1>جاري حفظ الملفات للاستخدام أوفلاين</h1>
    <div class="loader"></div>
    <p id="status">يرجى الانتظار، يتم الآن تخزين البيانات...</p>

    <script>
        // دالة تعاود ترجعك للصفحة الرئيسية
        function goToHome() {
            document.getElementById("status").innerHTML = "تم الكاش بنجاح! جاري العودة...";
            setTimeout(function(){
                window.location.href = "index.html";
            }, 2000); // يستنى 2 ثواني ويرجعك
        }

        // إذا كنت تستعمل Application Cache (الطريقة القديمة)
        if (window.applicationCache) {
            window.applicationCache.addEventListener('cached', function() {
                goToHome();
            }, false);

            window.applicationCache.addEventListener('noupdate', function() {
                goToHome();
            }, false);
            
            window.applicationCache.addEventListener('error', function() {
                // حتى لو صرا خطأ يرجعك باش ما تبقاش محبوس
                goToHome();
            }, false);
        } else {
            // إذا ماكانش كاش، يرجعك بعد 5 ثواني احتياطيا
            setTimeout(goToHome, 5000);
        }
    </script>
</body>
</html>
